# --- Backends (MCP servers) ---

backends:
  # Example: stdio backend (spawns a subprocess)
  # tavily:
  #   command: "npx -y @anthropic/mcp-server-tavily"
  #   description: "Web search via Tavily"
  #   enabled: true
  #   timeout: 30s
  #   idle_timeout: 300s          # Hibernate after 5 min idle
  #   env:
  #     TAVILY_API_KEY: "${TAVILY_API_KEY}"
  #   cwd: /tmp                   # Working directory (stdio only)

  # Example: HTTP backend (connects to running server)
  # context7:
  #   http_url: "http://localhost:8080/mcp"
  #   description: "Documentation lookup"
  #   streamable_http: true       # Use Streamable HTTP (no SSE handshake)
  #   protocol_version: "2025-03-26"  # Override protocol version
  #   headers:
  #     Authorization: "Bearer ${API_TOKEN}"

  # Example: SSE backend
  # pieces:
  #   http_url: "http://localhost:39300/sse"
  #   description: "Pieces LTM"

  # Example: GitMCP — free remote MCP server that auto-generates docs + code
  # search tools for any public GitHub repository (https://gitmcp.io).
  #
  # The `/docs` route is a dynamic dispatcher: the tools it exposes
  # (`fetch_generic_url_content`, `search_generic_code`, `search_generic_documentation`)
  # accept a repo URL as an argument, so a single backend covers every GitHub repo.
  #
  # For a repo-pinned backend, point `http_url` at the repo-specific route:
  #   gitmcp_mcp_gateway:
  #     http_url: "https://gitmcp.io/MikkoParkkola/mcp-gateway/sse"
  #     description: "GitMCP — docs + search for MikkoParkkola/mcp-gateway"
  # Repo-pinned routes expose tools named after the repo
  # (e.g. `fetch_mcp_gateway_documentation`, `search_mcp_gateway_code`).
  #
  # Transport: SSE (http_url ends in /sse, streamable_http defaults to false).
  # Auth: none required for public repos.
  # gitmcp_docs:
  #   http_url: "https://gitmcp.io/docs/sse"
  #   description: "GitMCP — on-demand docs + code search for any GitHub repo"
  #   timeout: 30s

  # Example: backend with OAuth
  # google:
  #   http_url: "https://mcp.googleapis.com/mcp"
  #   description: "Google services"
  #   oauth:
  #     enabled: true
  #     scopes:
  #       - "https://www.googleapis.com/auth/gmail.readonly"
  #     client_id: "env:GOOGLE_CLIENT_ID"
